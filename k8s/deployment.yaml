apiVersion: apps/v1
kind: Deployment
metadata:
  name: "rababaaa"
  namespace: "agents-global"
  labels:
    app: "rababaaa"
    team: "global"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "rababaaa"
  template:
    metadata:
      labels:
        app: "rababaaa"
        team: "global"
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: "sa-rababaaa"
      containers:
        - name: "rababaaa"
          image: "acrshoppoc.azurecr.io/agents/rababaaa:latest"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: "config-rababaaa"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
